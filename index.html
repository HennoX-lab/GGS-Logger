<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGS Live-Logger — HennoX Amethyst</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
    min-height: 100vh;
    padding: 16px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 4px 0;
    color: #7ee787;
  }
  .sub {
    color: #8b949e;
    font-size: 0.85rem;
    margin-bottom: 16px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #f85149;
    flex-shrink: 0;
  }
  .dot.connected { background: #3fb950; }
  .dot.connecting { background: #d29922; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  button {
    background: #238636;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button:disabled { background: #30363d; color: #6e7681; }
  button.secondary { background: #21262d; border: 1px solid #30363d; margin-top: 8px; }
  button.danger { background: #da3633; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .metric {
    background: #0d1117;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .metric .label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric .value { font-size: 1.6rem; font-weight: 700; margin-top: 2px; }
  .metric.co2 .value { color: #d2a8ff; }
  .metric.humi .value { color: #79c0ff; }
  .metric.temp .value { color: #ffa657; }
  .metric.vpd .value { color: #7ee787; }
  .log-count { font-size: 0.8rem; color: #8b949e; margin-top: 10px; }
  .chart-container {
    position: relative;
    width: 100%;
    height: 45vh;
    min-height: 220px;
    max-height: 500px;
  }
  @media (min-width: 700px) {
    .chart-container { height: 400px; }
  }
  @media (orientation: landscape) and (max-width: 1000px) {
    .chart-container { height: 60vh; }
  }
  .raw {
    font-family: monospace;
    font-size: 0.7rem;
    color: #6e7681;
    background: #0d1117;
    padding: 8px;
    border-radius: 6px;
    max-height: 100px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 10px;
  }
  .warn {
    background: #3d2b00;
    border: 1px solid #9e6a03;
    color: #d29922;
    border-radius: 8px;
    padding: 10px;
    font-size: 0.8rem;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<h1>🌱 GGS Live-Logger <span style="font-size:0.9rem;color:#8b949e;font-weight:400;">v1.26</span></h1>
<div class="sub">Klima- und Boden-Log für HennoX Amethyst</div>



<div class="card">
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Nicht verbunden</span>
  </div>
  <button id="connectBtn">Mit GGS Controller verbinden</button>
  <button id="disconnectBtn" class="secondary" style="display:none;">Trennen</button>
  <button id="forceReconnectBtn" class="secondary" style="display:none;">Jetzt neu verbinden (falls eingefroren)</button>

  <div class="grid">
    <div class="metric co2"><div class="label">CO2</div><div class="value" id="valCo2">—</div></div>
    <div class="metric humi"><div class="label">Feuchte</div><div class="value" id="valHumi">—</div></div>
    <div class="metric temp"><div class="label">Temp</div><div class="value" id="valTemp">—</div></div>
    <div class="metric vpd"><div class="label">VPD</div><div class="value" id="valVpd">—</div></div>
  </div>
  <div class="grid" style="margin-top:10px;grid-template-columns:1fr 1fr;">
    <div class="metric"><div class="label">Boden-Temp</div><div class="value" style="color:#ff7b72;" id="valTempSoil">—</div></div>
    <div class="metric"><div class="label">Boden-Feuchte</div><div class="value" style="color:#56d4dd;" id="valHumiSoil">—</div></div>
  </div>
  <div class="grid" style="margin-top:10px;grid-template-columns:1fr 1fr;">
    <div class="metric"><div class="label">PPFD</div><div class="value" style="color:#f2cc60;font-size:1.2rem;" id="valPpfd">—</div></div>
    <div class="metric"><div class="label">Licht-Stufe</div><div class="value" style="color:#e3b341;font-size:1.2rem;" id="valLightLevel">—</div></div>
    <div class="metric"><div class="label">Inline-Lüfter</div><div class="value" style="color:#a5a5f0;font-size:1.2rem;" id="valBlowerLevel">—</div></div>
    <div class="metric"><div class="label">CO2-Steckdose</div><div class="value" style="color:#d2a8ff;font-size:1.2rem;" id="valCo2Socket">—</div></div>
  </div>

  <div class="log-count" id="logCount">0 Messpunkte aufgezeichnet</div>
</div>

<div class="card">
  <div class="chart-container"><canvas id="chart"></canvas></div>
</div>

<div class="card">
  <div class="chart-container"><canvas id="chart2"></canvas></div>
</div>

<div class="card">
  <div class="chart-container"><canvas id="chart3"></canvas></div>
</div>

<div class="card">
  <div class="chart-container"><canvas id="chart4"></canvas></div>
</div>

<div class="card">
  <div class="chart-container"><canvas id="chart5"></canvas></div>
</div>

<div class="card">
  <button id="exportBtn" class="secondary">CSV exportieren (Sensordaten)</button>
  <button id="exportDebugBtn" class="secondary" style="margin-top:8px;">CSV exportieren (Debug-Log, alle Pakete)</button>
  <button id="clearBtn" class="danger" style="margin-top:8px;">Log leeren</button>
</div>

<div id="rawOut" style="display:none;"></div>

<script>
const SERVICE_UUID = 0x00ff; // bestätigt via chrome://bluetooth-internals
const NOTIFY_UUID = 0xff01;  // bestätigt: Notify-Property vorhanden

let device, server, notifyChar;
let dataLog = [];
let byteBuffer = [];
let wakeLock = null;
let shouldAutoReconnect = false;
let lastPacketTimestamp = null;

function saveToLocalStorage() {
  try {
    // Nur die letzten 500 Punkte speichern, um localStorage nicht zu sprengen
    const toSave = dataLog.slice(-500);
    localStorage.setItem('ggs_datalog', JSON.stringify(toSave));
  } catch (e) {
    console.warn('localStorage speichern fehlgeschlagen', e);
  }
}

function loadFromLocalStorage() {
  try {
    const saved = localStorage.getItem('ggs_datalog');
    if (saved) {
      dataLog = JSON.parse(saved);
      updateLogCountDisplay();
      updateChart();
    }
  } catch (e) {
    console.warn('localStorage laden fehlgeschlagen', e);
  }
}

const dot = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const connectBtn = document.getElementById('connectBtn');
const disconnectBtn = document.getElementById('disconnectBtn');
const rawOut = document.getElementById('rawOut');
const logCount = document.getElementById('logCount');

function forceReconnect(reason) {
  if (!device) return;
  console.warn('Erzwinge Reconnect: ' + reason);
  setStatus('connecting', reason + ' - erzwinge Neuverbindung…');
  lastPacketTimestamp = Date.now(); // verhindert mehrfaches Auslösen während des Reconnects
  if (device.gatt.connected) {
    device.gatt.disconnect(); // löst onDisconnected aus, das den Auto-Reconnect übernimmt
  } else {
    onDisconnected();
  }
}

document.getElementById('forceReconnectBtn').addEventListener('click', () => {
  forceReconnect('Manuell ausgelöst');
});

// Wachhund: erkennt "Zombie"-Verbindungen (Browser meldet "verbunden",
// aber es kommen keine Pakete mehr an) und erzwingt in diesem Fall einen
// Reconnect, unabhängig davon, ob der Browser selbst ein Trennungs-Ereignis
// auslöst (das passiert nicht zuverlässig bei jeder Art von Verbindungsverlust).
setInterval(() => {
  if (!shouldAutoReconnect || !device) return;
  if (lastPacketTimestamp === null) return;
  const silentFor = Date.now() - lastPacketTimestamp;
  if (silentFor > 45000) {
    forceReconnect('Keine Daten seit ' + Math.round(silentFor/1000) + 's');
  }
}, 30000);

// Sobald die Seite wieder sichtbar wird (z.B. nach Tab-/App-Wechsel oder
// Bildschirm-Entsperren), sofort prüfen statt bis zu 30s auf den Wachhund
// zu warten - Hintergrund-Drosselung durch Android kann die Verbindung
// eingefroren haben, ohne dass der Browser das selbst bemerkt hat.
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    if (wakeLock === null && shouldAutoReconnect) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) { /* best effort */ }
    }
    if (shouldAutoReconnect && device && lastPacketTimestamp !== null) {
      const silentFor = Date.now() - lastPacketTimestamp;
      if (silentFor > 20000) {
        forceReconnect('Seite wieder aktiv, seit ' + Math.round(silentFor/1000) + 's keine Daten');
      }
    }
  }
});

function setStatus(state, text) {
  dot.className = 'dot ' + state;
  statusText.textContent = text;
}

connectBtn.addEventListener('click', async () => {
  try {
    setStatus('connecting', 'Suche Gerät…');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'SF-GGS' }],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnected);
    setStatus('connecting', 'Verbinde…');
    server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    notifyChar = await service.getCharacteristic(NOTIFY_UUID);
    await notifyChar.startNotifications();
    notifyChar.addEventListener('characteristicvaluechanged', handleNotification);
    setStatus('connected', 'Verbunden: ' + device.name);
    connectBtn.style.display = 'none';
    disconnectBtn.style.display = 'block';
    document.getElementById('forceReconnectBtn').style.display = 'block';
    rawOut.textContent = 'Verbunden. Warte auf erstes Datenpaket vom Controller...';
    shouldAutoReconnect = true;
    lastPacketTimestamp = Date.now();

    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => console.log('Wake Lock freigegeben'));
    } catch (wlErr) {
      console.warn('Wake Lock nicht verfügbar:', wlErr.message);
    }
  } catch (err) {
    setStatus('', 'Fehler: ' + err.message);
    console.error(err);
  }
});

disconnectBtn.addEventListener('click', () => {
  shouldAutoReconnect = false;
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('forceReconnectBtn').style.display = 'none';
  if (device && device.gatt.connected) device.gatt.disconnect();
});

async function onDisconnected() {
  setStatus('', shouldAutoReconnect ? 'Getrennt - versuche erneut zu verbinden…' : 'Getrennt');
  connectBtn.style.display = 'block';
  disconnectBtn.style.display = 'none';
  if (!shouldAutoReconnect) document.getElementById('forceReconnectBtn').style.display = 'none';

  if (shouldAutoReconnect && device) {
    // Automatischer Wiederverbindungsversuch nach kurzer Pause
    await new Promise(r => setTimeout(r, 2000));
    try {
      setStatus('connecting', 'Verbinde erneut…');
      server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      notifyChar = await service.getCharacteristic(NOTIFY_UUID);
      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged', handleNotification);
      setStatus('connected', 'Wiederverbunden: ' + device.name);
      connectBtn.style.display = 'none';
      disconnectBtn.style.display = 'block';
      lastPacketTimestamp = Date.now();
    } catch (reErr) {
      setStatus('', 'Wiederverbinden fehlgeschlagen: ' + reErr.message);
      console.error(reErr);
    }
  }
}

let packetCount = 0;
let packetHistory = [];
let debugLog = [];

function stripPacketHeader(bytes) {
  // Bestätigt via nRF Connect: 19-Byte-Header (AA AA ...) kann bei JEDEM
  // einzelnen JS-Notification-Event auftreten, nicht nur beim ersten der Nachricht
  if (bytes.length >= 19 && bytes[0] === 0xAA && bytes[1] === 0xAA) {
    return bytes.slice(19);
  }
  return bytes;
}

function handleNotification(event) {
  lastPacketTimestamp = Date.now();
  packetCount++;
  const value = event.target.value;
  const rawBytes = new Uint8Array(value.buffer);
  const payloadBytes = stripPacketHeader(rawBytes);
  for (const b of payloadBytes) byteBuffer.push(b);

  const asText = new TextDecoder('utf-8', { fatal: false }).decode(payloadBytes);
  const hadHeader = rawBytes.length !== payloadBytes.length;
  packetHistory.push(`#${packetCount} [${hadHeader ? 'H' : '-'}] (${payloadBytes.length}B): "${asText}"`);
  if (packetHistory.length > 8) packetHistory.shift();
  rawOut.textContent = packetHistory.join('\n---\n');

  const text = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(byteBuffer));
  const firstBrace = text.indexOf('{');
  if (firstBrace === -1) return;
  const candidate = text.slice(firstBrace);

  let depth = 0, endIdx = -1;
  for (let i = 0; i < candidate.length; i++) {
    if (candidate[i] === '{') depth++;
    if (candidate[i] === '}') { depth--; if (depth === 0) { endIdx = i; break; } }
  }
  if (endIdx === -1) return;

  const jsonStrRaw = candidate.slice(0, endIdx + 1);
  byteBuffer = [];

  if (!jsonStrRaw.includes('"temp"') && !jsonStrRaw.includes('"co2"') && !jsonStrRaw.includes('"sensor"')) {
    packetHistory.push(`[übersprungen: keine Sensordaten in dieser Nachricht]`);
    if (packetHistory.length > 8) packetHistory.shift();
    rawOut.textContent = packetHistory.join('\n---\n');
    debugLog.push({ t: Date.now(), packetNum: packetCount, status: 'skipped', rawText: jsonStrRaw, errorMsg: '' });
    return;
  }

  const jsonStr = jsonStrRaw;
  const jsonStrClean = jsonStrRaw.replace(/[^\x20-\x7E]/g, '');

  // Robusteste Methode: jedes Sensorfeld EINZELN per Regex extrahieren, mit
  // Plausibilitätsprüfung. So wird nur das konkret beschädigte Feld verworfen,
  // nicht die ganze Nachricht - und korrupte Zahlen (falsche Werte durch
  // Byte-Fehler) werden erkannt statt unbemerkt übernommen.
  // Extrahiert ein Feld anhand des bekannten NÄCHSTEN Feldnamens als Grenze,
  // entfernt darin ALLE Störzeichen (nicht nur bis zum ersten) und setzt die
  // übrig gebliebenen Ziffern zusammen - robust gegen einzelne eingeschleuste
  // Störbytes mitten in der Zahl (z.B. Anführungszeichen), da die echten Ziffern
  // in der richtigen Reihenfolge erhalten bleiben.
  function extractFieldBounded(name, nextKey, min, max, requireDecimal) {
    const m = jsonStr.match(new RegExp('"' + name + '":(.*?),"' + nextKey + '"'));
    if (!m) return null;
    const cleaned = m[1].replace(/[^0-9.\-]/g, '');
    const pattern = requireDecimal ? /^-?[0-9]{1,3}\.[0-9]{1,2}$/ : /^-?[0-9]{1,4}$/;
    if (!pattern.test(cleaned)) return null;
    const val = parseFloat(cleaned);
    if (isNaN(val) || val < min || val > max) return null;
    return val;
  }

  const co2Val = extractFieldBounded('co2', 'tempSoil', 0, 5000, false);
  const humiVal = extractFieldBounded('humi', 'vpd', 0, 100, true);
  const tempVal = extractFieldBounded('temp', 'humi', -10, 60, true);
  const vpdVal = extractFieldBounded('vpd', 'ppfd', 0, 10, true);
  const ppfdVal = extractFieldBounded('ppfd', 'co2', 0, 3000, false);
  const tempSoilVal = extractFieldBounded('tempSoil', 'humiSoil', -10, 60, false);
  const humiSoilVal = extractFieldBounded('humiSoil', 'ECSoil', 0, 100, true);

  // Zusätzliche System-/Gerätewerte (Licht, Lüfter, CO2-Steckdose)
  function extractIntFromSection(sectionText, key, terminator) {
    if (!sectionText) return null;
    const m = sectionText.match(new RegExp('"' + key + '":(.*?)' + terminator));
    if (!m || m[1] === undefined) return null;
    const cleaned = m[1].replace(/[^0-9\-]/g, '');
    if (!/^-?[0-9]{1,5}$/.test(cleaned)) return null;
    const val = parseInt(cleaned, 10);
    return isNaN(val) ? null : val;
  }

  const lightSection = (jsonStr.match(/"light":\{(.*?)\},"light2"/) || [])[1] || null;
  const lightLevelVal = extractIntFromSection(lightSection, 'level', '(?:\\}|$)');
  const lightModeVal = extractIntFromSection(lightSection, 'modeType', ',"level"');

  const blowerSection = (jsonStr.match(/"blower":\{(.*?)\},"fan"/) || [])[1] || null;
  const blowerOnVal = extractIntFromSection(blowerSection, 'on', ',"level"');
  const blowerLevelVal = extractIntFromSection(blowerSection, 'level', '(?:\\}|$)');

  const fanSection = (jsonStr.match(/"fan":\{(.*)/) || [])[1] || null;
  const fanOnVal = extractIntFromSection(fanSection, 'on', ',"level"');
  const fanLevelVal = extractIntFromSection(fanSection, 'level', '\\}');

  const o4Section = (jsonStr.match(/"O4":\{(.*?)\},"O5"/) || [])[1] || null;
  const co2SocketOnVal = extractIntFromSection(o4Section, 'on', '(?:\\}|$)');

  if (jsonStr.includes('"sensor"') && (co2Val !== null || humiVal !== null || tempVal !== null)) {
    rawOut.textContent = 'Sensorwerte extrahiert: temp=' + tempVal + ' humi=' + humiVal + ' co2=' + co2Val + ' vpd=' + vpdVal;
    debugLog.push({ t: Date.now(), packetNum: packetCount, status: 'ok-field-extract', rawText: jsonStrRaw, errorMsg: '' });
    processPayload({ sensor: {
      co2: co2Val, humi: humiVal, temp: tempVal, vpd: vpdVal, ppfd: ppfdVal,
      tempSoil: tempSoilVal, humiSoil: humiSoilVal
    }, extra: {
      lightLevel: lightLevelVal, lightMode: lightModeVal,
      blowerOn: blowerOnVal, blowerLevel: blowerLevelVal,
      fanOn: fanOnVal, fanLevel: fanLevelVal,
      co2SocketOn: co2SocketOnVal
    }});
    return;
  }

  try {
    const parsed = JSON.parse(jsonStr);
    rawOut.textContent = 'JSON erfolgreich geparst:\n' + jsonStr + '\n\n--- Letzte Pakete ---\n' + packetHistory.join('\n---\n');
    debugLog.push({ t: Date.now(), packetNum: packetCount, status: 'ok', rawText: jsonStr, errorMsg: '' });
    processPayload(parsed);
  } catch (e1) {
    try {
      const parsed = JSON.parse(jsonStrClean);
      rawOut.textContent = 'JSON erfolgreich geparst (bereinigt):\n' + jsonStrClean + '\n\n--- Letzte Pakete ---\n' + packetHistory.join('\n---\n');
      debugLog.push({ t: Date.now(), packetNum: packetCount, status: 'ok-cleaned', rawText: jsonStrRaw, errorMsg: '' });
      processPayload(parsed);
    } catch (e2) {
      rawOut.textContent = 'PARSE-FEHLER: ' + e1.message + '\n\nJSON (roh):\n' + jsonStr + '\n\n--- Letzte Pakete ---\n' + packetHistory.join('\n---\n');
      console.warn('JSON parse failed', e1, jsonStr);
      debugLog.push({ t: Date.now(), packetNum: packetCount, status: 'error', rawText: jsonStrRaw, errorMsg: e1.message });
    }
  }
}

function processPayload(parsed) {
  const d = parsed.data || parsed;
  const sensor = d.sensor || d;
  const extra = parsed.extra || {};

  const last = dataLog.length > 0 ? dataLog[dataLog.length - 1] : {};

  const co2 = sensor.co2 ?? last.co2 ?? null;
  const humi = sensor.humi ?? last.humi ?? null;
  const temp = sensor.temp ?? last.temp ?? null;
  const vpd = sensor.vpd ?? last.vpd ?? null;
  const ppfd = sensor.ppfd ?? last.ppfd ?? null;
  const tempSoil = sensor.tempSoil ?? last.tempSoil ?? null;
  const humiSoil = sensor.humiSoil ?? last.humiSoil ?? null;

  const lightLevel = extra.lightLevel ?? last.lightLevel ?? null;
  const blowerOn = extra.blowerOn ?? last.blowerOn ?? null;
  const blowerLevel = extra.blowerLevel ?? last.blowerLevel ?? null;
  const fanOn = extra.fanOn ?? last.fanOn ?? null;
  const fanLevel = extra.fanLevel ?? last.fanLevel ?? null;
  const co2SocketOn = extra.co2SocketOn ?? last.co2SocketOn ?? null;

  if (co2 !== null) document.getElementById('valCo2').textContent = co2 + ' ppm';
  if (humi !== null) document.getElementById('valHumi').textContent = humi + ' %';
  if (temp !== null) document.getElementById('valTemp').textContent = temp.toFixed(1) + ' °C';
  if (vpd !== null) document.getElementById('valVpd').textContent = vpd + ' kPa';
  if (tempSoil !== null) document.getElementById('valTempSoil').textContent = tempSoil.toFixed(1) + ' °C';
  if (humiSoil !== null) document.getElementById('valHumiSoil').textContent = humiSoil + ' %';
  if (ppfd !== null) document.getElementById('valPpfd').textContent = ppfd + ' µmol/m²/s';
  if (lightLevel !== null) document.getElementById('valLightLevel').textContent = lightLevel + ' %';
  if (blowerLevel !== null) document.getElementById('valBlowerLevel').textContent = blowerLevel + ' %';
  if (co2SocketOn !== null) document.getElementById('valCo2Socket').textContent = co2SocketOn;

  if (co2 !== null || humi !== null) {
    dataLog.push({ t: Date.now(), co2, humi, temp, vpd, ppfd, tempSoil, humiSoil, lightLevel, blowerOn, blowerLevel, fanOn, fanLevel, co2SocketOn });
    updateLogCountDisplay();
    updateChart();
    saveToLocalStorage();
  }
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}min`;
  if (m > 0) return `${m}min ${s}s`;
  return `${s}s`;
}

function updateLogCountDisplay() {
  if (dataLog.length === 0) {
    logCount.textContent = '0 Messpunkte aufgezeichnet';
    return;
  }
  const first = dataLog[0].t;
  const last = dataLog[dataLog.length - 1].t;
  const duration = formatDuration(last - first);
  const lastTime = new Date(last).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  logCount.textContent = dataLog.length + ' Messpunkte · Zeitraum: ' + duration + ' · zuletzt: ' + lastTime;
}

// Chart Setup
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],

function updateChart() {
  const recent = dataLog.slice(-120); // letzte 120 Punkte
  chart.data.labels = recent.map(p => new Date(p.t).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  chart.data.datasets[0].data = recent.map(p => p.co2);
  chart.data.datasets[1].data = recent.map(p => p.humi);
  chart.update('none');

  chart2.data.labels = chart.data.labels;
  chart2.data.datasets[0].data = recent.map(p => p.temp);
  chart2.data.datasets[1].data = recent.map(p => p.vpd);

  chart3.data.labels = chart.data.labels;

  chart3.data.datasets[1].data = recent.map(p => p.humiSoil);

  chart4.data.datasets[0].data = recent.map(p => p.ppfd);
  chart4.data.datasets[1].data = recent.map(p => p.lightLevel);
  chart4.update('none');

  chart5.data.labels = chart.data.labels;
  chart5.data.datasets[0].data = recent.map(p => p.blowerLevel);
  chart5.data.datasets[1].data = recent.map(p => p.co2SocketOn);
  chart5.update('none');
}

document.getElementById('exportBtn').addEventListener('click', () => {
  let csv = 'Zeitstempel;CO2_ppm;Feuchte_%;Temp_C;VPD_kPa;PPFD;Boden_Temp_C;Boden_Feuchte_%;Licht_Stufe;Bluefter_An;CO2_Steckdose_An;Fan_An;Fan_Gang\n';
  dataLog.forEach(p => {
    csv += new Date(p.t).toISOString() + ';' + (p.co2 ?? '') + ';' + (p.humi ?? '') + ';' + (p.temp ?? '') + ';' + (p.vpd ?? '') + ';' + (p.ppfd ?? '') + ';' + (p.tempSoil ?? '') + ';' + (p.humiSoil ?? '') + ';' + (p.lightLevel ?? '') + ';' + (p.blowerOn ?? '') + ';' + (p.co2SocketOn ?? '') + ';' + (p.fanOn ?? '') + ';' + (p.fanLevel ?? '') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ggs_log_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.csv';
  a.click();
});

document.getElementById('exportDebugBtn').addEventListener('click', () => {
  let csv = 'Zeitstempel;Paket_Nr;Status;RohText;Fehlermeldung\n';
  debugLog.forEach(p => {
    const safeRaw = '"' + String(p.rawText).replace(/"/g, '""') + '"';
    const safeErr = '"' + String(p.errorMsg).replace(/"/g, '""') + '"';
    csv += new Date(p.t).toISOString() + ';' + p.packetNum + ';' + p.status + ';' + safeRaw + ';' + safeErr + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ggs_debug_log_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.csv';
  a.click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  dataLog = [];

});
